<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PBS 182 Challenge — Styled Calculator App</title>
    <style>
      /*
       * Import Fonts from Google Fonts
       */
      @import url('https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Quicksand:wght@300..700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
      
      /* 
       * Basic layout — OK TO EDIT (probably not necessary)
       */
      table#calculator {
        border-collapse: separate;
        text-align: center;
      }
      table#calculator input.display{
        text-align: right;
        font-family: monospace;
        box-sizing: border-box;
        width: 100%;
      }
      table#calculator button {
        width: 100%;
      }

      /* 
       *  Define Editable Look and Feel using Custom Properties — THIS IS WHERE YOU SHOULD BE FOCUSING YOUR ATTENTION
       */

      /* --- YOUR CODE: START --- */

      /*
       * Define custom properties for controling the calculator's brand, readability, and usability.
       */

      /* the base font size for the calculator */
      @property --calc-base-font-size-px { /* Be sure to keep divisible by 8 */
        syntax: '<integer>';
        inherits: true;
        initial-value: 24; /* 1.5x browser default */
      }

      /* the base spacing unit for the calculator — derive from the base font size */
      @property --calc-space-px {
        syntax: '<integer>'; 
        inherits: true;
        /* no initial value — will compute from --calc-base-font-size-px */
      }

      /* the calculator's brand colour — used to derive many other colours in the design */
      @property --calc-brand-color {
        syntax: '<color>';
        inherits: true;
        initial-value: #00408d; /* The PBS Blue */
      }

      /* the calculator's brand font */
      @property --calc-brand-font {
        syntax: '<string>#';
        inherits: true;
        initial-value: "Ubuntu Mono", "monospace"; /* The heading font used on the PBS site */
      }

      /* the width of the calculator's outer border */
      @property --calc-border-width {
        syntax: '<length>';
        inherits: true;
        initial-value: 1px;
      }

      /* the style of the calculator's outer border */
      @property --calc-border-style {
        syntax: "ridge | inset | outset | groove | solid | dashed | dotted | double | none | hidden";
        inherits: true;
        initial-value: solid;
      }

      /*
       * Configure the calculator's Readability
       */
      
      table#calculator {
        --calc-space-px: calc(var(--calc-base-font-size-px) / 8); /* set the base spacing unit to one eighth of the base font size */
        font-size: calc(var(--calc-base-font-size-px) * 1px);
        width: calc(var(--calc-base-font-size-px) * 16px);
        margin: calc(var(--calc-space-px) * 16px) auto;
        border-radius: calc(var(--calc-space-px) * 3px);
      }
      table#calculator td {
        padding: calc(var(--calc-space-px) * 1px)
      }
      table#calculator input.display {
        font-size: calc(var(--calc-base-font-size-px) * 3px);
      }
      table#calculator button {
        font-size: calc(var(--calc-base-font-size-px) * 1.5px);
      }

      /*
       * Configure the calculator's Branding
       */
      table#calculator {
        border-color: var(--calc-brand-color);
        border-width: var(--calc-border-width);
        border-style: var(--calc-border-style);
        background-color: color-mix(in srgb, var(--calc-brand-color) 10%, white);
      }
      table#calculator thead th {
        color: var(--calc-brand-color);
        font-family: var(--calc-brand-font);
      }

      /*
       * Configure the calculator's Usability
       */

      @property --calc-display-font {
        syntax: '<string>#';
        inherits: true;
        initial-value: "Doto", "monospace";
      }
      @property --calc-button-font {
        syntax: '<string>#';
        inherits: true;
        initial-value: "Quicksand", "sans-serif";
      }

      /* Style the display */
      table#calculator input.display {
        font-family: var(--calc-display-font);
        background-color: color-mix(in srgb, var(--calc-brand-color), black 25%);
        color: color-mix(in srgb, var(--calc-brand-color) 25%, white);
        border-radius: calc(var(--calc-space-px) * 2px);
        border-color: black;
        border-style: solid;
      }

      /* common styles for all the buttons */
      table#calculator button {
        font-family: var(--calc-button-font);
        color: #2c2c2c;
        border-radius: calc(var(--calc-space-px) * 2px);
        border-color: black;
        border-style: solid;
        background-color: LightGray;
        border-width: 1px;
      }

      /* special styles for the operator buttons */
      table#calculator button.operator {
        color: black;
        font-weight: bold;
      }

      /* special styles for the action buttons */
      table#calculator button.action {
        font-weight: bold;
      }

      /* special styles for the backspace and clear buttons */
      table#calculator button[data-action="backspace"],
      table#calculator button[data-action="clear"] {
        background-color: oklch(from var(--calc-brand-color) l c 40);
        color: white;
      }

      /** special styles for the calculate button */
      table#calculator button[data-action="calculate"] {
        background-color: oklch(from var(--calc-brand-color) l c 160);
        color: white;
      }

      /* --- YOUR CODE: END --- */

    </style>
  </head>
  <body>
    <!--
      The HTML for the calculator interface — DO NOT EDIT

      Data Attributes:
      ================
      state: The current state of the calculator, which can be one of:
        - empty: no input has been entered yet
        - accumulating: a calculations is being entered
        - result: the result of a calculation is being displayed
        - error: an error message is being displayed
    -->
    <table id="calculator" data-state="empty">
      <thead>
        <tr>
          <th colspan="4">PBS Delux Calculator</th>
        </tr>
      </thead>
      <tbody> 
        <tr>
          <td colspan="4" class="display-cell" >
            <input class="display" type="text" value="0" readonly>
          </td>
        </tr>
        <tr>
          <td class="number-cell"><button class="digit" data-digit="7">7</button></td>
          <td class="number-cell"><button class="digit" data-digit="8">8</button></td>
          <td class="number-cell"><button class="digit" data-digit="9">9</button></td>
          <td class="operator-cell"><button class="operator" data-operator="/">&divide;</button></td>
        </tr>
        <tr>
          <td class="number-cell"><button class="digit" data-digit="4">4</button></td>
          <td class="number-cell"><button class="digit" data-digit="5">5</button></td>
          <td class="number-cell"><button class="digit" data-digit="6">6</button></td>
          <td class="operator-cell"><button class="operator" data-operator="*">&times;</button></td>
        </tr>
        <tr>
          <td class="number-cell"><button class="digit" data-digit="1">1</button></td>
          <td class="number-cell"><button class="digit" data-digit="2">2</button></td>
          <td class="number-cell"><button class="digit" data-digit="3">3</button></td>
          <td class="operator-cell"><button class="operator" data-operator="-">&minus;</button></td>
        </tr>
        <tr>
          <td class="blank-cell">&nbsp;</td>
          <td class="number-cell"><button class="digit" data-digit="0">0</button></td>
          <td class="number-cell"><button class="digit" data-digit=".">.</button></td>
          <td class="operator-cell"><button class="operator" data-operator="+">&plus;</button></td>
        </tr>
        <tr>
          <td class="action-cell"><button class="action" data-action="clear">AC</button></td>
          <td class="action-cell"><button class="action" data-action="backspace">&#9003;</button></td>
          <td colspan="2" class="action-cell"><button class="action" data-action="calculate">=</button></td>
        </tr>
      </tbody>
    </table>
  </body> 

  <!-- Import jQuery from CDN -->
  <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>

  <!-- The JavaScript code to power the calculator - DO NOT EDIT -->
  <script>
    // Encapsulate all the code inside the jQuery ready function for simplicity and to ensure it runs after the DOM is fully loaded
    $(document).ready(function() {
      // define variables
      $calculator = $('#calculator');
      $display = $('#calculator input[type="text"].display');
      
      // define helper functions
      state = function(newState) {
        if (newState !== undefined) {
          $calculator.data('state', newState);
        }
        return $calculator.data('state');
      };
      empty = function() {
        state('empty');
        $display.val('0');
      };

      // add a click hander to the clear button
      $('button.action[data-action="clear"]', $calculator).click(function() {
        empty();
      });

      // add a click handler to the backspace button
      $('button.action[data-action="backspace"]', $calculator).click(function() {
        if (state() === 'accumulating') {
          const currentValue = $display.val();
          if (currentValue.length > 1) {
            $display.val(currentValue.slice(0, -1));
          } else {
            empty();
          }
        }
      });

      // add click handlers to the digit buttons
      $('button.digit', $calculator).click(function() {
        // if the calculator is in the accumulating state, add the digit to the display, otherwise, enter the accumulating state and set the display to the digit
        if (state() === 'accumulating') {
          $display.val($display.val() + $(this).data('digit'));
        } else {
          state('accumulating');
          if($(this).data('digit') === '.') {
            // if the user clicks the decimal point when not accumulating, start with 0.
            $display.val('0.');
          }else{
            $display.val($(this).data('digit'));
          }
        }
      });

      // add click handlers to the operator buttons
      $('button.operator', $calculator).click(function() {
        // if the calculator is in the accumulating state, add the operator to the display, otherwise, enter the accumulating state and set the display to the operator
        if (state() === 'accumulating') {
          $display.val($display.val() + $(this).data('operator'));
        } else {
          if ($(this).data('operator') === '-') {
            // allow the user to start a negative number with the minus operator
            state('accumulating');
            $display.val($(this).data('operator'));
          } else if ($(this).data('operator') === '.') {
            // if the user clicks the decimal point when not accumulating, start with 0.
            state('accumulating');
            $display.val('0.');
          } else if ($(this).data('operator') === '+') {
            // allow the user to start with a plus operator, just prefix it with a 0
            state('accumulating');
            $display.val('0' + $(this).data('operator'));
          } else {
            empty();
          }
        }
      });

      // add a click handler to the calculate button
      $('button.action[data-action="calculate"]', $calculator).click(function() {
        if (state() === 'accumulating') {
          try {
            const result = eval($display.val());
            state('result');
            $display.val('=' + result);
          } catch (e) {
            state('error');
            $display.val('Error');
          }
        } else {
          empty();
        }
      });
    });
  </script>
</html>
