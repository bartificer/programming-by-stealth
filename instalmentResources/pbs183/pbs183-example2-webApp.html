<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PBS 183 — Example 2 (Web App)</title>

    <!-- Import Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- The CSS to style the calculator interface -->
    <style>
      /*
       * Import the Bartificer Fonts
       */
      @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Georama:ital,wght@0,100..900;1,100..900&family=Victor+Mono:ital,wght@0,100..700;1,100..700&display=swap');

      /* 
       * Basic layout
       */
      
      /* set the width of the calculator widget so it fits nicely on even the samllest breakpoint*/
      div#calculator {
        width: calc(var(--bs-breakpoint-sm) * 0.8); /* 80% of Bootrap's sm breakpoint */
      }

      /*
       * Define custom properties for the Bartificer typography
       */
      @property --bartificer-logo-font-family {
        syntax: '<string>#';
        inherits: true;
        initial-value: "Exo 2", "sans-serif";
      }
      @property --bartificer-body-font-family {
        syntax: '<string>#';
        inherits: true;
        initial-value: "Georama", "sans-serif";
      }
      @property --bartificer-monospace-font-family {
        syntax: '<string>#';
        inherits: true;
        initial-value: "Victor Mono", "monospace";
      }
      @property --bartificer-monospace-font-weight {
        syntax: '<integer>';
        inherits: true;
        initial-value: 500;
      }

      /*
       * Define custom properites for the Bartificer colour scheme
       */
      @property --bartificer-logo-green {
        syntax: '<color>';
        inherits: true;
        initial-value: #93c01f;
      }
      @property --bartificer-bg {
        syntax: '<color>';
        inherits: true;
        initial-value: #faf8f0;
      }
      @property --bartificer-primary {
        syntax: '<color>';
        inherits: true;
        initial-value: #1da6e5;
      }
      @property --bartificer-secondary {
        syntax: '<color>';
        inherits: true;
        initial-value: #8c9daf;
      }
      @property --bartificer-success {
        syntax: '<color>';
        inherits: true;
        initial-value: #78a046;
      }
      @property --bartificer-danger {
        syntax: '<color>';
        inherits: true;
        initial-value: #dc5a3c;
      }

      /*
       * Override the default Bootstrap card styles for the calculator card
       */
      div#calculator {
        --bs-card-border-color: var(--bartificer-logo-green);
        --bs-card-cap-bg: var(--bartificer-logo-green);
        --bs-card-cap-color: white;
        --bs-card-bg: var(--bartificer-bg);
      }

      /*
       * Style the Calculator header
       */
      div#calculator .card-header {
        font-family: var(--bartificer-logo-font-family);
        font-size: 1.5rem;
        font-weight: bold;
      }

      /*
       * Style the calculator display
       */
      div#calculator .display {
        font-family: var(--bartificer-monospace-font-family);
        font-weight: var(--bartificer-monospace-font-weight);
      }

      /*
       * Style the calculator buttons
       */
      div#calculator .btn {
        font-family: var(--bartificer-body-font-family);
      }
      div#calculator button.action {
        font-weight: bold;
      }

      /*
       * Override the default Bootstrap button colours for the buttons inside the calculator
       */
      div#calculator .btn-primary {
        --bs-btn-bg: var(--bartificer-primary);
        --bs-btn-border-color: color-mix(in srgb, var(--bartificer-primary), black 20%);
        --bs-btn-hover-bg: color-mix(in srgb, var(--bartificer-primary), black 20%);
      }
      div#calculator .btn-secondary {
        --bs-btn-bg: var(--bartificer-secondary);
        --bs-btn-border-color: color-mix(in srgb, var(--bartificer-secondary), black 20%);
        --bs-btn-hover-bg: color-mix(in srgb, var(--bartificer-secondary), black 20%);
      }
      div#calculator .btn-success {
        --bs-btn-bg: var(--bartificer-success);
        --bs-btn-border-color: color-mix(in srgb, var(--bartificer-success), black 20%);
        --bs-btn-hover-bg: color-mix(in srgb, var(--bartificer-success), black 20%);
      }
      div#calculator .btn-danger {
        --bs-btn-bg: var(--bartificer-danger);
        --bs-btn-border-color: color-mix(in srgb, var(--bartificer-danger), black 20%);
        --bs-btn-hover-bg: color-mix(in srgb, var(--bartificer-danger), black 20%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col">
          <!--
          The HTML for the calculator interface

          Data Attributes:
          ================
          state: The current state of the calculator, which can be one of:
            - empty: no input has been entered yet
            - accumulating: a calculations is being entered
            - result: the result of a calculation is being displayed
            - error: an error message is being displayed
          -->
          <div class="card text-center my-5 mx-auto" id="calculator" data-state="empty">
            <div class="card-header">
              Bartificer Delux Calculator
            </div>
            <div class="card-body">
              <div class="container">
                <div class="row display-row">
                  <div class="col px-1 display-col">
                    <input class="display form-control form-control-lg text-end" type="text" value="0" readonly>  
                  </div>
                </div>
                <div class="row mt-2 button-grid-row">
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="7">7</button>
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="8">8</button>
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="9">9</button>
                  </div>
                  <div class="col px-1 operator-col">
                    <button class="btn btn-sm btn-primary w-100 operator" data-operator="/">&divide;</button>
                  </div>
                </div>
                <div class="row mt-2 button-grid-row">
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="4">4</button>
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="5">5</button>
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="6">6</button>
                  </div>
                  <div class="col px-1 operator-col">
                    <button class="btn btn-sm btn-primary w-100 operator" data-operator="*">&times;</button>
                  </div>
                </div>
                <div class="row mt-2 button-grid-row">
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="1">1</button>
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="2">2</button>
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="3">3</button>
                  </div>
                  <div class="col px-1 operator-col">
                    <button class="btn btn-sm btn-primary w-100 operator" data-operator="-">&minus;</button>
                  </div>
                </div>
                <div class="row mt-2 button-grid-row">
                  <div class="col px-1 blank-col">
                    &nbsp;
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit="0">0</button>
                  </div>
                  <div class="col px-1 number-col">
                    <button class="btn btn-sm btn-secondary w-100 digit" data-digit=".">.</button>
                  </div>
                  <div class="col px-1 operator-col">
                    <button class="btn btn-sm btn-primary w-100 operator" data-operator="+">&plus;</button>
                  </div>
                </div>
                <div class="row mt-2 button-grid-row">
                  <div class="col-3 px-1 action-col">
                    <button class="btn btn-sm btn-danger w-100 action" data-action="clear">AC</button>
                  </div>
                  <div class="col-3 px-1 action-col">
                    <button class="btn btn-sm btn-danger w-100 action" data-action="backspace">&#9003;</button>
                  </div>
                  <div class="col-6 px-1 action-col">
                    <button class="btn btn-sm btn-success w-100 action" data-action="calculate">=</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body> 

  <!-- Import jQuery from CDN -->
  <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>

  <!-- The JavaScript code to power the calculator - DO NOT EDIT -->
  <script>
    // Encapsulate all the code inside the jQuery ready function for simplicity and to ensure it runs after the DOM is fully loaded
    $(document).ready(function() {
      // define variables
      $calculator = $('#calculator');
      $display = $('#calculator input[type="text"].display');
      
      // define helper functions
      state = function(newState) {
        if (newState !== undefined) {
          $calculator.data('state', newState);
        }
        return $calculator.data('state');
      };
      empty = function() {
        state('empty');
        $display.val('0');
      };

      // add a click hander to the clear button
      $('button.action[data-action="clear"]', $calculator).click(function() {
        empty();
      });

      // add a click handler to the backspace button
      $('button.action[data-action="backspace"]', $calculator).click(function() {
        if (state() === 'accumulating') {
          const currentValue = $display.val();
          if (currentValue.length > 1) {
            $display.val(currentValue.slice(0, -1));
          } else {
            empty();
          }
        }
      });

      // add click handlers to the digit buttons
      $('button.digit', $calculator).click(function() {
        // if the calculator is in the accumulating state, add the digit to the display, otherwise, enter the accumulating state and set the display to the digit
        if (state() === 'accumulating') {
          $display.val($display.val() + $(this).data('digit'));
        } else {
          state('accumulating');
          if($(this).data('digit') === '.') {
            // if the user clicks the decimal point when not accumulating, start with 0.
            $display.val('0.');
          }else{
            $display.val($(this).data('digit'));
          }
        }
      });

      // add click handlers to the operator buttons
      $('button.operator', $calculator).click(function() {
        // if the calculator is in the accumulating state, add the operator to the display, otherwise, enter the accumulating state and set the display to the operator
        if (state() === 'accumulating') {
          $display.val($display.val() + $(this).data('operator'));
        } else {
          if ($(this).data('operator') === '-') {
            // allow the user to start a negative number with the minus operator
            state('accumulating');
            $display.val($(this).data('operator'));
          } else if ($(this).data('operator') === '.') {
            // if the user clicks the decimal point when not accumulating, start with 0.
            state('accumulating');
            $display.val('0.');
          } else if ($(this).data('operator') === '+') {
            // allow the user to start with a plus operator, just prefix it with a 0
            state('accumulating');
            $display.val('0' + $(this).data('operator'));
          } else {
            empty();
          }
        }
      });

      // add a click handler to the calculate button
      $('button.action[data-action="calculate"]', $calculator).click(function() {
        if (state() === 'accumulating') {
          try {
            const result = eval($display.val());
            state('result');
            $display.val('=' + result);
          } catch (e) {
            state('error');
            $display.val('Error');
          }
        } else {
          empty();
        }
      });
    });
  </script>
</html>
